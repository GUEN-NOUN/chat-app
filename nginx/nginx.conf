worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length   1024;

    # ── Upstream Node app ───────────────────────────────────────────────────
    upstream app {
        server app:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN_HERE;   # <-- replace with your domain

        # TLS (put your certs in nginx/certs/)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header X-Frame-Options       SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy       strict-origin-when-cross-origin;
        add_header Permissions-Policy    "camera=(), microphone=(), geolocation=()";

        # Max upload size
        client_max_body_size 20m;

        # ── Uploads: serve directly from nginx (bypass Node) ───────────────
        location /uploads/ {
            alias /app/uploads/;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            add_header X-Content-Type-Options nosniff;
        }

        # ── WebSocket (Socket.io) ───────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;   # keep alive for long connections
        }

        # ── Everything else → Node app ──────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
