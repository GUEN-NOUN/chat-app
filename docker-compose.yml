version: "3.9"

services:
  # ── Node.js backend ────────────────────────────────────────────────────────
  app:
    build: .
    container_name: madarik-app
    restart: unless-stopped
    env_file: server/.env
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      # Persist SQLite database
      - ./server/madarik.db:/app/server/madarik.db
      # Persist uploaded files
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"   # expose directly (or use nginx below)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Nginx reverse proxy (optional, recommended in production) ─────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: madarik-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro    # put your TLS certs here
      - uploads_data:/app/uploads:ro          # serve uploads statically
    depends_on:
      - app

volumes:
  uploads_data:
